<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player's Handbook - Dragon's MapTool Macros</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- Banner with top overlay nav aligned to container -->
    <div class="position-relative text-center">
        <img src="backgroundimage.jpg" alt="fantasy forest" class="banner-image w-100">
        <div class="position-absolute top-50 start-50 translate-middle text-white" style="text-shadow: 0 2px 6px rgba(0,0,0,0.6);">
            <h1 class="display-5 fw-bold m-0">Dragon's MapTool Macros</h1>
            <div class="fs-5 fw-semibold mt-2">5.5th Edition</div>
        </div>
        <div class="position-absolute top-0 start-0 w-100">
            <div class="container py-3">
                <div class="d-flex justify-content-start">
                    <a href="index.html" class="btn btn-sm btn-light">Home</a>
                    <a href="playershandbook.html" class="btn btn-sm btn-light ms-2">Player's Handbook</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-4">
        <h2>Player's Handbook</h2>

        <!-- Navigation buttons for images -->
        <div class="btn-group mb-3" role="group" aria-label="Image navigation">
            <a class="btn btn-outline-primary" href="#img1">1</a>
            <a class="btn btn-outline-primary" href="#img2">2</a>
            <a class="btn btn-outline-primary" href="#img3">3</a>
        </div>

        <!-- Images: centered at natural width. Each has an anchor id so buttons jump to them -->
        <div>
            <img src="images/1.png" id="img1" alt="Page 1">
        </div>
        <div>
            <img src="images/2.png" id="img2" alt="Page 2">
        </div>
        <div>
            <img src="images/3.png" id="img3" alt="Page 2">
        </div>
    </div>

    <!-- Footer spacer -->
    <div class="container">
        <div class="py-5"></div>
    </div>

     <!-- Include Bootstrap JS (v5) and app script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
